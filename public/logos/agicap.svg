<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Agicap logo: circle with wave/field lines inside -->
  <g fill="none" stroke="#3B72F6" stroke-width="8" stroke-linecap="round">
    <!-- Outer circle -->
    <circle cx="100" cy="100" r="88" />
    <!-- Top arc / book-like open shape -->
    <path d="M55,75 Q78,55 100,55 Q122,55 145,75"/>
    <!-- Middle wave -->
    <path d="M45,100 Q67,80 100,80 Q133,80 155,100"/>
    <!-- Bottom wave -->
    <path d="M50,125 Q72,105 100,105 Q128,105 150,125"/>
    <!-- Lowest wave -->
    <path d="M60,148 Q80,130 100,130 Q120,130 140,148"/>
  </g>
</svg>
